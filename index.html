<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pac-Bear</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      color: #ffffff;
      overflow: hidden;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 4px;
      margin-bottom: 12px;
      color: #790ECB;
      text-shadow: 0 0 20px #790ECB, 0 0 40px #790ECB88;
    }

    #hud {
      display: flex;
      gap: 40px;
      margin-bottom: 10px;
      font-size: 1rem;
      letter-spacing: 2px;
    }

    #hud span {
      color: #c084fc;
    }

    #hud .label {
      color: #9ca3af;
    }

    #gameCanvas {
      border: 2px solid #790ECB;
      box-shadow: 0 0 30px #790ECB55, 0 0 60px #790ECB22;
      display: block;
      background: #000;
    }

    #message {
      margin-top: 14px;
      font-size: 0.85rem;
      color: #9ca3af;
      letter-spacing: 1px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h1>PAC-BEAR</h1>
  <div id="hud">
    <div><span class="label">SCORE: </span><span id="scoreDisplay">0</span></div>
    <div><span class="label">LIVES: </span><span id="livesDisplay">♥ ♥ ♥</span></div>
    <div><span class="label">LEVEL: </span><span id="levelDisplay">1</span></div>
    <div><span class="label">BEST: </span><span id="highScoreDisplay">0</span></div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="message">Use arrow keys to move! Press any arrow key to start</div>

  <script src="game.js"></script>
</body>
</html>
